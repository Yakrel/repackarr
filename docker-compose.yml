services:
  repackarr:
    image: ghcr.io/yakrel/repackarr:latest
    container_name: repackarr
    restart: unless-stopped
    ports:
      - "8090:80"
    env_file:
      - .env
    volumes:
      - ./data:/app/data  # Database and logs
    environment:
      - TZ=Europe/Istanbul  # Timezone for logs and scheduling
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
