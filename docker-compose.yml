services:
  repackarr:
    build: .
    image: repackarr:latest
    container_name: repackarr
    restart: unless-stopped
    ports:
      - "8090:80"
    environment:
      - TZ=Europe/Istanbul
      - APP_HOST=0.0.0.0
      - APP_PORT=80
      - LOG_LEVEL=INFO
      # qBittorrent Settings
      - QBIT_HOST=http://qbittorrent:8080
      - QBIT_USERNAME=admin
      - QBIT_PASSWORD=adminadmin
      # Prowlarr Settings
      - PROWLARR_URL=http://prowlarr:9696
      - PROWLARR_API_KEY=replace_with_your_prowlarr_api_key
      # Application Settings
      - CRON_INTERVAL_MINUTES=60
      - PLATFORM_FILTER=Windows,Linux
      # Security (Optional Basic Auth)
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=secret
    volumes:
      - ./data:/app/data
    networks:
      - arr-network

networks:
  arr-network:
    external: true