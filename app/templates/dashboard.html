{% extends "base.html" %}

{% block content %}
<!-- Stats Cards -->
<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
    <div class="bg-dark-800/50 rounded-xl border border-dark-700/50 p-4 hover:border-dark-600/50 transition">
        <div class="flex items-center gap-3">
            <div class="p-2 rounded-lg bg-brand-500/20">
                <svg class="w-5 h-5 text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <div>
                <p class="text-2xl font-bold text-white">{{ stats.total_games }}</p>
                <p class="text-xs text-dark-400">Total Games</p>
            </div>
        </div>
    </div>
    
    <div class="bg-dark-800/50 rounded-xl border border-dark-700/50 p-4 hover:border-dark-600/50 transition">
        <div class="flex items-center gap-3">
            <div class="p-2 rounded-lg bg-emerald-500/20">
                <svg class="w-5 h-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </div>
            <div>
                <p class="text-2xl font-bold text-white">{{ stats.monitored_games }}</p>
                <p class="text-xs text-dark-400">Monitored</p>
            </div>
        </div>
    </div>
    
    <div class="bg-dark-800/50 rounded-xl border border-dark-700/50 p-4 hover:border-dark-600/50 transition">
        <div class="flex items-center gap-3">
            <div class="p-2 rounded-lg bg-amber-500/20">
                <svg class="w-5 h-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
            </div>
            <div>
                <p class="text-2xl font-bold text-white">{{ stats.pending_updates }}</p>
                <p class="text-xs text-dark-400">Updates Found</p>
            </div>
        </div>
    </div>
    
    <div class="bg-dark-800/50 rounded-xl border border-dark-700/50 p-4 hover:border-dark-600/50 transition">
        <div class="flex items-center gap-3">
            <div class="p-2 rounded-lg bg-cyan-500/20">
                <svg class="w-5 h-5 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <div>
                <p class="text-2xl font-bold text-white">{{ settings.CRON_INTERVAL_MINUTES }}m</p>
                <p class="text-xs text-dark-400">Scan Interval</p>
            </div>
        </div>
    </div>
</div>

<!-- Updates Section -->
<div id="updates-container" hx-get="/updates-list" hx-trigger="updates-changed from:body">
    {% include "partials/updates_list.html" %}
</div>
{% endblock %}
